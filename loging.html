<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Soul Dev</title>
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Daisy UI and Tailwind Css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <section class="bg-[#F8FAFC] h-[100vh] pt-16">
        <div id="login" class="bg-white max-w-[520px] p-8 mx-auto shadow-lg rounded-lg">
            <div class="flex flex-col items-center">
                <img src="./assets/github-logo.png" alt="github logo">
                <h2 class="mt-6 text-2xl text-[#1F2937] font-semibold mb-1">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] mb-6">Sign in to manage your issues</p>
            </div>
            <div class="fieldset">
                <legend class="fieldset-legend ">Username</legend>
                <input type="text" class="input w-full" placeholder="Type here" />
                <p class="label">Optional</p>
            </div>
            <div>

            </div>
        </div>
    </section>


</body>

</html>
