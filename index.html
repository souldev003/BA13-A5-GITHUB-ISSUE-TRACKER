<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Soul Dev</title>
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Daisy UI and Tailwind Css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body>
    <section class="bg-[#F8FAFC] h-[100vh] pt-16">
        <div id="login" class="bg-white max-w-[520px] p-8 mx-auto shadow-lg rounded-lg">
            <div class="flex flex-col items-center">
                <img src="./assets/github-logo.png" alt="github logo">
                <h2 class="mt-6 text-2xl text-[#1F2937] font-semibold mb-1">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] mb-6">Sign in to manage your issues</p>
            </div>

            <div class="fieldset">
                <h1 class="font-medium text-base">Username</h1>
                <input id="username-input" type="text" class="input w-full" placeholder="Enter Username" />
                <p class="text-sm text-[#4A00FF] font-normal">Default: admin</p>
            </div>
            <div class="fieldset mt-2">
                <h1 class="font-medium text-base">Password</h1>
                <input id="password-input" type="text" class="input w-full" placeholder="Enter Password" />
                <p class="text-sm text-[#4A00FF] font-normal">Default: admin123</p>
            </div>

            <button onclick="signIn()" class="btn btn-primary btn-block mt-6 rounded-md">Sign In</button>

            <div class="my-6 flex items-center">
                <hr class="w-[45%] h-1 text-[#E4E4E7]">
                <span class="w-[10%] text-[#1F2937] text-center">OR</span>
                <hr class="w-[45%] h-1 text-[#E4E4E7]">
            </div>
            <div>
                <P class="text-[#64748B] text-center mb-2 text-sm font-normal">Demo Credentials:</P>
                <div class="bg-[#F8FAFC] text-center p-6 rounded-lg">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>

    <script src="./script/index.js"></script>
</body>

</html>
